<!DOCTYPE html>
<html>

<head>
    <link href="popup.css" rel="stylesheet" type="text/css" />
</head>

<body>
    <div id="logged-out-view" style="display: none; text-align: center; padding: 24px;">
        <div style="font-size: 14px; margin-bottom: 16px; color: #444;">
            Sign in to your account to access and save your YouTube bookmarks.
        </div>
        <a href="http://localhost:3000/login" id="login-link" target="_blank"
            style="display: block; background: #ff0000; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: 600;">
            Go to Website / Login
        </a>
    </div>
    <div id="logged-in-view" class="container" style="display: none;">
    </div>
    <div id="auth-container" style="display: none; padding: 20px;">
        <div class="title">Login to Vortex</div>
        <input id="email" type="email" placeholder="Email" style="width:100%; margin: 5px 0;">
        <input id="password" type="password" placeholder="Password" style="width:100%; margin: 5px 0;">
        <button id="login-btn"
            style="width:100%; background: #ff0000; color: white; border: none; padding: 8px;">Login</button>
    </div>
    <div id="main-container" class="container">
        <div class="header">
            <div class="title">Your Bookmarks</div>
            <button id="export-btn">Copy All</button>
        </div>
        <div class="bookmarks" id="bookmarks"></div>
    </div>
    <script type="module" src="popup.js"></script>
</body>

</html>
